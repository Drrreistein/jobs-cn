<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Exposure of the US Job Market</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0f;
  --bg2: #12121a;
  --fg: #e0e0e8;
  --fg2: #888894;
  --sidebar-w: 220px;
}

body {
  background: var(--bg);
  color: var(--fg);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  overflow: hidden;
  height: 100vh;
}

#sidebar {
  position: fixed;
  top: 0; left: 0; bottom: 0;
  width: var(--sidebar-w);
  background: var(--bg2);
  border-right: 1px solid rgba(255,255,255,0.06);
  padding: 20px 18px;
  z-index: 10;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

#sidebar h1 {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.02em;
  line-height: 1.3;
}
#sidebar .subtitle {
  font-size: 11px;
  color: var(--fg2);
  margin-top: 4px;
  line-height: 1.4;
}
#sidebar .subtitle a { color: var(--fg2); }

.stat-section {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.stat-section h3 {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--fg2);
}
.stat-big {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1;
}
.stat-label {
  font-size: 11px;
  color: var(--fg2);
}

.tier-bar {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.tier-row {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
}
.tier-color {
  width: 10px;
  height: 10px;
  border-radius: 2px;
  flex-shrink: 0;
}
.tier-name {
  flex: 1;
  color: var(--fg2);
}
.tier-jobs {
  text-align: right;
  white-space: nowrap;
}
.tier-pct {
  text-align: right;
  width: 32px;
  color: var(--fg2);
  font-size: 10px;
}

.histogram {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  height: 48px;
}
.histogram .bar {
  flex: 1;
  border-radius: 1px 1px 0 0;
  min-height: 1px;
  position: relative;
}
.hist-labels {
  display: flex;
  justify-content: space-between;
  font-size: 9px;
  color: var(--fg2);
  margin-top: 2px;
}

.hbar-chart {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.hbar-row {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
}
.hbar-label {
  width: 68px;
  flex-shrink: 0;
  color: var(--fg2);
  font-size: 10px;
  text-align: right;
}
.hbar-track {
  flex: 1;
  height: 10px;
  background: rgba(255,255,255,0.04);
  border-radius: 2px;
  overflow: hidden;
}
.hbar-fill {
  height: 100%;
  border-radius: 2px;
}
.hbar-val {
  width: 22px;
  flex-shrink: 0;
  font-size: 10px;
  color: var(--fg);
  text-align: right;
}

/* 四象限统计面板 */
.quadrant-stats {
  display: none;
  flex-direction: column;
  gap: 8px;
}
.quadrant-stats.visible {
  display: flex;
}
.quad-stat-item {
  padding: 8px 10px;
  border-radius: 6px;
  background: rgba(255,255,255,0.04);
  border-left: 3px solid transparent;
}
.quad-stat-item.q1 { border-left-color: rgba(46, 204, 113, 0.8); }
.quad-stat-item.q2 { border-left-color: rgba(243, 156, 18, 0.8); }
.quad-stat-item.q3 { border-left-color: rgba(231, 76, 60, 0.8); }
.quad-stat-item.q4 { border-left-color: rgba(52, 152, 219, 0.8); }
.quad-stat-title {
  font-size: 11px;
  font-weight: 600;
  margin-bottom: 4px;
}
.quad-stat-item.q1 .quad-stat-title { color: rgba(46, 204, 113, 1); }
.quad-stat-item.q2 .quad-stat-title { color: rgba(243, 156, 18, 1); }
.quad-stat-item.q3 .quad-stat-title { color: rgba(231, 76, 60, 1); }
.quad-stat-item.q4 .quad-stat-title { color: rgba(52, 152, 219, 1); }
.quad-stat-row {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: var(--fg2);
  margin-top: 2px;
}
.quad-stat-value {
  color: var(--fg);
}

.view-toggle {
  display: flex;
  gap: 4px;
}
.view-toggle button {
  flex: 1;
  padding: 5px 0;
  font-size: 10px;
  font-weight: 500;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 4px;
  background: transparent;
  color: var(--fg2);
  cursor: pointer;
  transition: all 0.15s;
}
.view-toggle button.active {
  background: rgba(255,255,255,0.08);
  color: var(--fg);
  border-color: rgba(255,255,255,0.2);
}
.view-toggle button:hover:not(.active) {
  background: rgba(255,255,255,0.04);
}

.gradient-legend {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  color: var(--fg2);
}
.gradient-legend canvas {
  border-radius: 2px;
}

/* 语言切换按钮 */
.lang-toggle {
  display: flex;
  gap: 4px;
  margin-bottom: 8px;
}
.lang-toggle button {
  flex: 1;
  padding: 6px 10px;
  border: 1px solid rgba(255,255,255,0.12);
  background: transparent;
  color: var(--fg2);
  font-size: 11px;
  cursor: pointer;
  border-radius: 4px;
  transition: all 0.15s;
}
.lang-toggle button:hover {
  background: rgba(255,255,255,0.06);
  color: var(--fg);
}
.lang-toggle button.active {
  background: rgba(255,255,255,0.12);
  color: var(--fg);
  border-color: rgba(255,255,255,0.2);
}

canvas#canvas {
  display: block;
  position: fixed;
  top: 0;
  left: var(--sidebar-w);
  cursor: default;
}

#tooltip {
  position: fixed;
  pointer-events: none;
  background: var(--bg2);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 13px;
  line-height: 1.5;
  max-width: 340px;
  opacity: 0;
  transition: opacity 0.12s;
  z-index: 20;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}
#tooltip.visible { opacity: 1; }
#tooltip .tt-title {
  font-weight: 600;
  font-size: 14px;
  margin-bottom: 6px;
  color: #fff;
}
#tooltip .tt-exposure {
  font-size: 12px;
  margin-bottom: 8px;
}
#tooltip .tt-stats {
  display: grid;
  grid-template-columns: auto auto;
  gap: 2px 12px;
  font-size: 12px;
}
#tooltip .tt-stats .label { color: var(--fg2); }
#tooltip .tt-stats .value { color: var(--fg); text-align: right; }
#tooltip .tt-rationale {
  font-size: 11px;
  color: var(--fg2);
  margin-top: 8px;
  line-height: 1.4;
  border-top: 1px solid rgba(255,255,255,0.06);
  padding-top: 8px;
}

/* 搜索框样式 */
.search-container {
  position: relative;
  margin-bottom: 12px;
}
.search-input {
  width: 100%;
  padding: 8px 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 6px;
  color: var(--fg);
  font-size: 12px;
  outline: none;
  transition: all 0.15s;
}
.search-input::placeholder {
  color: var(--fg2);
}
.search-input:focus {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.2);
}
.search-results {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  max-height: 280px;
  overflow-y: auto;
  background: var(--bg2);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 6px;
  margin-top: 4px;
  z-index: 100;
  display: none;
}
.search-results.visible {
  display: block;
}
.search-result-item {
  padding: 8px 12px;
  cursor: pointer;
  font-size: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  transition: background 0.1s;
}
.search-result-item:last-child {
  border-bottom: none;
}
.search-result-item:hover {
  background: rgba(255,255,255,0.08);
}
.search-result-item .job-title {
  color: var(--fg);
  margin-bottom: 2px;
}
.search-result-item .job-category {
  color: var(--fg2);
  font-size: 10px;
}

/* 报告浮层样式 */
.report-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.report-overlay.visible {
  display: flex;
}
.report-card {
  background: var(--bg2);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px;
  max-width: 480px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}
.report-header {
  padding: 16px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.report-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--fg);
  margin-bottom: 4px;
}
.report-category {
  font-size: 11px;
  color: var(--fg2);
}
.report-close {
  background: none;
  border: none;
  color: var(--fg2);
  font-size: 20px;
  cursor: pointer;
  padding: 4px;
  line-height: 1;
  transition: color 0.15s;
}
.report-close:hover {
  color: var(--fg);
}
.report-body {
  padding: 20px;
}
.report-section {
  margin-bottom: 20px;
}
.report-section:last-child {
  margin-bottom: 0;
}
.report-section-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--fg2);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 12px;
}
.exposure-display {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}
.exposure-score {
  font-size: 32px;
  font-weight: 700;
}
.exposure-bar {
  flex: 1;
  height: 8px;
  background: rgba(255,255,255,0.08);
  border-radius: 4px;
  overflow: hidden;
}
.exposure-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.3s;
}
.exposure-label {
  font-size: 12px;
  color: var(--fg2);
}
.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.stat-row:last-child {
  border-bottom: none;
}
.stat-label {
  font-size: 13px;
  color: var(--fg2);
}
.stat-value {
  font-size: 13px;
  color: var(--fg);
  font-weight: 500;
}
.rationale-text {
  font-size: 12px;
  color: var(--fg2);
  line-height: 1.6;
}
.rationale-toggle {
  color: var(--fg);
  cursor: pointer;
  font-size: 11px;
  margin-top: 8px;
  display: inline-block;
}
.rationale-toggle:hover {
  text-decoration: underline;
}
.recommendations-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.recommendation-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 12px;
  background: rgba(255,255,255,0.04);
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s;
}
.recommendation-item:hover {
  background: rgba(255,255,255,0.08);
}
.recommendation-name {
  font-size: 13px;
  color: var(--fg);
}
.recommendation-exposure {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  background: rgba(255,255,255,0.08);
}

/* 视图按钮提示浮窗 */
.view-tooltip {
  position: fixed;
  max-width: 320px;
  background: var(--bg2);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  z-index: 1000;
  opacity: 0;
  transform: translateY(5px);
  transition: opacity 0.15s, transform 0.15s;
  pointer-events: none;
}
.view-tooltip.visible {
  opacity: 1;
  transform: translateY(0);
}
.view-tooltip-header {
  padding: 12px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  font-weight: 600;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.view-tooltip-body {
  padding: 12px 16px;
  font-size: 12px;
  line-height: 1.6;
  color: var(--fg2);
}
.view-tooltip-body h4 {
  color: var(--fg);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin: 12px 0 6px 0;
}
.view-tooltip-body h4:first-child {
  margin-top: 0;
}
.view-tooltip-body ul {
  margin: 4px 0;
  padding-left: 16px;
}
.view-tooltip-body li {
  margin: 4px 0;
}
.view-tooltip-body .highlight {
  color: var(--fg);
  font-weight: 500;
}
.view-tooltip-body .quad-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  margin: 6px 0;
}
.view-tooltip-body .quad-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin-top: 3px;
  flex-shrink: 0;
}
.view-tooltip-body .quad-dot.q1 { background: rgba(46, 204, 113, 0.9); }
.view-tooltip-body .quad-dot.q2 { background: rgba(243, 156, 18, 0.9); }
.view-tooltip-body .quad-dot.q3 { background: rgba(231, 76, 60, 0.9); }
.view-tooltip-body .quad-dot.q4 { background: rgba(52, 152, 219, 0.9); }
</style>
</head>
<body>

<div id="sidebar">
  <div>
    <h1 id="pageTitle">美国就业市场的AI暴露度分析</h1>
    <div class="subtitle" id="pageSubtitle">342种职业 · 颜色 = AI暴露度<br>数据来自 <a href="https://www.bls.gov/ooh/">美国劳工统计局</a>，由Gemini Flash评分<br><a href="https://github.com/karpathy/jobs">GitHub原项目</a></div>
  </div>

  <div class="lang-toggle">
    <button class="active" onclick="setLang('zh')" id="langZh">中文</button>
    <button onclick="setLang('en')" id="langEn">English</button>
  </div>

  <div class="search-container">
    <input type="text" class="search-input" id="searchInput" placeholder="搜索职业..." autocomplete="off">
    <div class="search-results" id="searchResults"></div>
  </div>

  <div class="view-toggle">
    <button class="active" onclick="setView('treemap')" id="viewTreemap" data-view="treemap">树状图</button>
    <button onclick="setView('scatter')" id="viewScatter" data-view="scatter">暴露度与前景</button>
    <button onclick="setView('quadrant')" id="viewQuadrant" data-view="quadrant">四象限分析</button>
  </div>

  <div class="stat-section">
    <h3 id="statTotalJobsLabel">总就业人数</h3>
    <div class="stat-big" id="statTotalJobs">—</div>
  </div>

  <div class="stat-section">
    <h3 id="statAvgExposureLabel">加权平均暴露度</h3>
    <div class="stat-big" id="statAvgExposure">—</div>
    <div class="stat-label" id="statAvgExposureDesc">按就业人数加权，0-10分制</div>
  </div>

  <div class="stat-section">
    <h3 id="statHistogramLabel">各暴露度就业人数分布（按就业人数加权）</h3>
    <div class="histogram" id="histogram"></div>
    <div class="hist-labels"><span>0</span><span>5</span><span>10</span></div>
  </div>

  <div class="stat-section">
    <h3 id="statTierLabel">暴露度分级</h3>
    <div class="tier-bar" id="tierBar"></div>
  </div>

  <div class="stat-section">
    <h3 id="statPayLabel">各薪资水平暴露度</h3>
    <div class="hbar-chart" id="payChart"></div>
  </div>

  <div class="stat-section">
    <h3 id="statEduLabel">各教育水平暴露度</h3>
    <div class="hbar-chart" id="eduChart"></div>
  </div>

  <div class="stat-section">
    <h3 id="statWagesLabel">高暴露度职业薪资</h3>
    <div class="stat-big" id="statWages">—</div>
    <div class="stat-label" id="statWagesDesc">高暴露度职业(7+分)的年度薪资总额</div>
  </div>

  <div class="gradient-legend">
    <span id="legendLow">低</span>
    <canvas id="gradientLegend" width="80" height="8"></canvas>
    <span id="legendHigh">高</span>
  </div>

  <!-- 四象限统计面板 -->
  <div class="quadrant-stats" id="quadrantStats">
    <div class="quad-stat-item q1">
      <div class="quad-stat-title" id="quadQ1Title">安全增长型</div>
      <div class="quad-stat-row"><span id="quadQ1JobsLabel">职业数</span><span class="quad-stat-value" id="quadQ1Jobs">—</span></div>
      <div class="quad-stat-row"><span id="quadQ1EmpLabel">就业人数</span><span class="quad-stat-value" id="quadQ1Emp">—</span></div>
      <div class="quad-stat-row"><span id="quadQ1PayLabel">平均薪资</span><span class="quad-stat-value" id="quadQ1Pay">—</span></div>
    </div>
    <div class="quad-stat-item q2">
      <div class="quad-stat-title" id="quadQ2Title">转型增长型</div>
      <div class="quad-stat-row"><span id="quadQ2JobsLabel">职业数</span><span class="quad-stat-value" id="quadQ2Jobs">—</span></div>
      <div class="quad-stat-row"><span id="quadQ2EmpLabel">就业人数</span><span class="quad-stat-value" id="quadQ2Emp">—</span></div>
      <div class="quad-stat-row"><span id="quadQ2PayLabel">平均薪资</span><span class="quad-stat-value" id="quadQ2Pay">—</span></div>
    </div>
    <div class="quad-stat-item q3">
      <div class="quad-stat-title" id="quadQ3Title">高危衰退型</div>
      <div class="quad-stat-row"><span id="quadQ3JobsLabel">职业数</span><span class="quad-stat-value" id="quadQ3Jobs">—</span></div>
      <div class="quad-stat-row"><span id="quadQ3EmpLabel">就业人数</span><span class="quad-stat-value" id="quadQ3Emp">—</span></div>
      <div class="quad-stat-row"><span id="quadQ3PayLabel">平均薪资</span><span class="quad-stat-value" id="quadQ3Pay">—</span></div>
    </div>
    <div class="quad-stat-item q4">
      <div class="quad-stat-title" id="quadQ4Title">稳定停滞型</div>
      <div class="quad-stat-row"><span id="quadQ4JobsLabel">职业数</span><span class="quad-stat-value" id="quadQ4Jobs">—</span></div>
      <div class="quad-stat-row"><span id="quadQ4EmpLabel">就业人数</span><span class="quad-stat-value" id="quadQ4Emp">—</span></div>
      <div class="quad-stat-row"><span id="quadQ4PayLabel">平均薪资</span><span class="quad-stat-value" id="quadQ4Pay">—</span></div>
    </div>
  </div>
</div>

<canvas id="canvas"></canvas>

<div id="tooltip">
  <div class="tt-title"></div>
  <div class="tt-exposure"></div>
  <div class="tt-stats"></div>
  <div class="tt-rationale"></div>
</div>

<!-- 职业报告浮层 -->
<div class="report-overlay" id="reportOverlay">
  <div class="report-card">
    <div class="report-header">
      <div>
        <div class="report-title" id="reportTitle"></div>
        <div class="report-category" id="reportCategory"></div>
      </div>
      <button class="report-close" onclick="hideReport()">×</button>
    </div>
    <div class="report-body" id="reportBody">
      <!-- 内容由JS动态填充 -->
    </div>
  </div>
</div>

<!-- 视图按钮提示浮窗 -->
<div class="view-tooltip" id="viewTooltip">
  <div class="view-tooltip-header">
    <span class="view-tooltip-icon"></span>
    <span class="view-tooltip-title"></span>
  </div>
  <div class="view-tooltip-body"></div>
</div>

<script>

// ── Language Configuration ───────────────────────────────────────────────

let currentLang = 'zh';

const LANG = {
  zh: {
    title: '美国就业市场的AI暴露度分析',
    subtitle: '342种职业 · 颜色 = AI暴露度<br>数据来自 <a href="https://www.bls.gov/ooh/">美国劳工统计局</a>，由Gemini Flash评分<br><a href="https://github.com/karpathy/jobs">GitHub原项目</a>',

// ── Exposure color scale ───────────────────────────────────────────────

function exposureColor(score) {
  if (score == null) return [128, 128, 128];
  const t = Math.max(0, Math.min(10, score)) / 10;
  let r, g, b;
  if (t < 0.5) {
    const s = t / 0.5;
    r = Math.round(50 + s * 180);
    g = Math.round(160 - s * 10);
    b = Math.round(50 - s * 20);
  } else {
    const s = (t - 0.5) / 0.5;
    r = Math.round(230 + s * 25);
    g = Math.round(150 - s * 110);
    b = Math.round(30 - s * 10);
  }
  return [r, g, b];
}

function exposureColorCSS(score, alpha) {
  const [r, g, b] = exposureColor(score);
  return `rgba(${r},${g},${b},${alpha})`;
}

function outlookColorCSS(outlook, alpha) {
  if (outlook == null) return `rgba(128,128,128,${alpha})`;
  // Clamp to +/-12% for good saturation without overdoing it
  const t = Math.max(0, Math.min(1, (outlook + 12) / 24));
  let r, g, b;
  if (t < 0.5) {
    const s = t / 0.5;
    r = Math.round(220 - s * 40);
    g = Math.round(60 + s * 100);
    b = Math.round(50 - s * 20);
  } else {
    const s = (t - 0.5) / 0.5;
    r = Math.round(180 - s * 130);
    g = Math.round(160 + s * 10);
    b = Math.round(30 + s * 30);
  }
  return `rgba(${r},${g},${b},${alpha})`;
}

// ── Squarified treemap layout ──────────────────────────────────────────

function squarify(items, x, y, w, h) {
  if (items.length === 0) return [];
  if (items.length === 1) {
    return [{ ...items[0], rx: x, ry: y, rw: w, rh: h }];
  }

  const total = items.reduce((s, d) => s + d.value, 0);
  if (total === 0) return [];

  const results = [];
  let remaining = [...items];
  let cx = x, cy = y, cw = w, ch = h;

  while (remaining.length > 0) {
    const remTotal = remaining.reduce((s, d) => s + d.value, 0);
    const vertical = cw >= ch;
    const side = vertical ? ch : cw;

    let row = [remaining[0]];
    let rowSum = remaining[0].value;

    for (let i = 1; i < remaining.length; i++) {
      const candidate = [...row, remaining[i]];
      const candidateSum = rowSum + remaining[i].value;
      if (worstAspect(candidate, candidateSum, side, remTotal, vertical ? cw : ch) <
          worstAspect(row, rowSum, side, remTotal, vertical ? cw : ch)) {
        row = candidate;
        rowSum = candidateSum;
      } else {
        break;
      }
    }

    const rowFraction = rowSum / remTotal;
    const rowThickness = vertical ? cw * rowFraction : ch * rowFraction;

    let offset = 0;
    for (const item of row) {
      const itemFraction = item.value / rowSum;
      const itemLength = side * itemFraction;
      if (vertical) {
        results.push({ ...item, rx: cx, ry: cy + offset, rw: rowThickness, rh: itemLength });
      } else {
        results.push({ ...item, rx: cx + offset, ry: cy, rw: itemLength, rh: rowThickness });
      }
      offset += itemLength;
    }

    if (vertical) {
      cx += rowThickness;
      cw -= rowThickness;
    } else {
      cy += rowThickness;
      ch -= rowThickness;
    }

    remaining = remaining.slice(row.length);
  }

  return results;
}

function worstAspect(row, rowSum, side, totalArea, availableExtent) {
  const rowExtent = availableExtent * (rowSum / totalArea);
  if (rowExtent === 0) return Infinity;
  let worst = 0;
  for (const item of row) {
    const itemLen = side * (item.value / rowSum);
    if (itemLen === 0) continue;
    const aspect = Math.max(rowExtent / itemLen, itemLen / rowExtent);
    if (aspect > worst) worst = aspect;
  }
  return worst;
}

// ── Quadrant view (exposure x outlook scatter) ─────────────────────────────

let quadRects = [];
let quadMeta = {};

function layoutQuadrant() {
  const sidebarW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sidebar-w'));
  const w = (window.innerWidth - sidebarW);
  const h = window.innerHeight;

  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + "px";
  canvas.style.height = h + "px";

  const pad = { top: 60, bottom: 50, left: 60, right: 30 };
  const plotW = w - pad.left - pad.right;
  const plotH = h - pad.top - pad.bottom;

  // 获取outlook范围
  let minOutlook = Infinity, maxOutlook = -Infinity;
  for (const d of data) {
    if (d.outlook != null) {
      minOutlook = Math.min(minOutlook, d.outlook);
      maxOutlook = Math.max(maxOutlook, d.outlook);
    }
  }
  // 扩展范围留边距
  minOutlook = Math.floor(minOutlook / 5) * 5 - 5;
  maxOutlook = Math.ceil(maxOutlook / 5) * 5 + 5;

  // 计算最大就业人数用于散点大小映射
  const maxJobs = Math.max(...data.map(d => d.jobs || 0));
  const maxRadius = Math.min(plotW, plotH) / 20;
  const minRadius = 3;

  quadRects = [];
  for (const d of data) {
    if (d.exposure == null || d.outlook == null) continue;

    // X: exposure (0-10) -> 从左到右，左高右低（左边危险，右边安全）
    const x = pad.left + (1 - d.exposure / 10) * plotW;
    // Y: outlook (minOutlook-maxOutlook) -> 从下到上
    const y = pad.top + plotH - ((d.outlook - minOutlook) / (maxOutlook - minOutlook)) * plotH;

    // 散点半径基于就业人数
    const jobs = d.jobs || 1;
    const radius = Math.max(minRadius, Math.sqrt(jobs / maxJobs) * maxRadius);

    // 确定象限 (exposure < 5 为右侧=安全, outlook >= 0 为上方)
    const quadrant = (d.exposure < 5 ? 0 : 2) + (d.outlook >= 0 ? 0 : 1);

    quadRects.push({
      ...d,
      cx: x,
      cy: y,
      baseX: x,
      baseY: y,
      radius,
      quadrant
    });
  }

  // 应用抖动算法分散重叠的点
  applyJitter(quadRects, pad, plotW, plotH);

  // 存储元数据
  quadMeta = { pad, plotW, plotH, minOutlook, maxOutlook, maxJobs, maxRadius };
}

// ── Jitter algorithm to spread overlapping points ───────────────────────

function applyJitter(points, pad, plotW, plotH) {
  // 多次迭代，每次检测碰撞并微调位置
  const iterations = 50;
  const maxDisplacement = Math.min(plotW, plotH) / 30; // 最大位移

  for (let iter = 0; iter < iterations; iter++) {
    let moved = false;

    for (let i = 0; i < points.length; i++) {
      const p1 = points[i];
      let dx = 0, dy = 0;

      for (let j = 0; j < points.length; j++) {
        if (i === j) continue;
        const p2 = points[j];

        const diffX = p1.cx - p2.cx;
        const diffY = p1.cy - p2.cy;
        const dist = Math.sqrt(diffX * diffX + diffY * diffY);
        const minDist = p1.radius + p2.radius + 2; // 额外2px间距

        if (dist < minDist && dist > 0) {
          // 计算排斥力
          const force = (minDist - dist) / dist;
          dx += diffX * force * 0.5;
          dy += diffY * force * 0.5;
        }
      }

      if (dx !== 0 || dy !== 0) {
        // 限制位移量
        const displacement = Math.sqrt(dx * dx + dy * dy);
        if (displacement > maxDisplacement) {
          dx = dx / displacement * maxDisplacement;
          dy = dy / displacement * maxDisplacement;
        }

        p1.cx += dx;
        p1.cy += dy;
        moved = true;
      }
    }

    if (!moved) break;
  }

  // 确保所有点都在边界内
  for (const p of points) {
    p.cx = Math.max(pad.left + p.radius, Math.min(pad.left + plotW - p.radius, p.cx));
    p.cy = Math.max(pad.top + p.radius, Math.min(pad.top + plotH - p.radius, p.cy));
  }
}

function drawQuadrant() {
  const w = canvas.width;
  const h = canvas.height;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = "#0a0a0f";
  ctx.fillRect(0, 0, w / dpr, h / dpr);

  const L = LANG[currentLang];
  const { pad, plotW, plotH, minOutlook, maxOutlook } = quadMeta;

  // 象限颜色
  const quadColors = {
    0: { fill: 'rgba(46, 204, 113, 0.15)', border: 'rgba(46, 204, 113, 0.3)' },  // Q1: 安全增长 - 绿色
    1: { fill: 'rgba(52, 152, 219, 0.15)', border: 'rgba(52, 152, 219, 0.3)' },  // Q4: 稳定停滞 - 蓝色
    2: { fill: 'rgba(243, 156, 18, 0.15)', border: 'rgba(243, 156, 18, 0.3)' },  // Q2: 转型增长 - 橙色
    3: { fill: 'rgba(231, 76, 60, 0.15)', border: 'rgba(231, 76, 60, 0.3)' },    // Q3: 高危衰退 - 红色
  };

  // 绘制象限背景
  const midX = pad.left + plotW / 2;
  const midY = pad.top + plotH / 2;

  // Q1 (右上)
  ctx.fillStyle = quadColors[0].fill;
  ctx.fillRect(midX, pad.top, plotW / 2, plotH / 2);
  // Q4 (右下)
  ctx.fillStyle = quadColors[1].fill;
  ctx.fillRect(midX, midY, plotW / 2, plotH / 2);
  // Q2 (左上)
  ctx.fillStyle = quadColors[2].fill;
  ctx.fillRect(pad.left, pad.top, plotW / 2, plotH / 2);
  // Q3 (左下)
  ctx.fillStyle = quadColors[3].fill;
  ctx.fillRect(pad.left, midY, plotW / 2, plotH / 2);

  // 绘制分割线
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
  ctx.lineWidth = 1;
  ctx.setLineDash([5, 5]);
  // 垂直线 (exposure=5)
  ctx.beginPath();
  ctx.moveTo(midX, pad.top);
  ctx.lineTo(midX, pad.top + plotH);
  ctx.stroke();
  // 水平线 (outlook=0)
  ctx.beginPath();
  ctx.moveTo(pad.left, midY);
  ctx.lineTo(pad.left + plotW, midY);
  ctx.stroke();
  ctx.setLineDash([]);

  // 绘制坐标轴
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
  ctx.lineWidth = 1;
  // X轴
  ctx.beginPath();
  ctx.moveTo(pad.left, pad.top + plotH);
  ctx.lineTo(pad.left + plotW, pad.top + plotH);
  ctx.stroke();
  // Y轴
  ctx.beginPath();
  ctx.moveTo(pad.left, pad.top);
  ctx.lineTo(pad.left, pad.top + plotH);
  ctx.stroke();

  // X轴刻度和标签 (从右到左: 0, 2, 4, 6, 8, 10，即左边高风险，右边低风险)
  ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
  ctx.font = '11px -apple-system, system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  for (let i = 0; i <= 10; i += 2) {
    const x = pad.left + (1 - i / 10) * plotW;
    ctx.beginPath();
    ctx.moveTo(x, pad.top + plotH);
    ctx.lineTo(x, pad.top + plotH + 5);
    ctx.stroke();
    ctx.fillText(i.toString(), x, pad.top + plotH + 8);
  }
  // X轴标签
  ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
  ctx.font = '12px -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif';
  ctx.fillText(L.quadXAxis, pad.left + plotW / 2, pad.top + plotH + 30);

  // Y轴刻度和标签
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  const ySteps = 5;
  const yRange = maxOutlook - minOutlook;
  for (let i = 0; i <= ySteps; i++) {
    const val = minOutlook + (i / ySteps) * yRange;
    const y = pad.top + plotH - (i / ySteps) * plotH;
    ctx.beginPath();
    ctx.moveTo(pad.left - 5, y);
    ctx.lineTo(pad.left, y);
    ctx.stroke();
    ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
    ctx.font = '11px -apple-system, system-ui, sans-serif';
    ctx.fillText((val > 0 ? '+' : '') + val.toFixed(0) + '%', pad.left - 8, y);
  }
  // Y轴标签
  ctx.save();
  ctx.translate(pad.left - 45, pad.top + plotH / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
  ctx.font = '12px -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(L.quadYAxis, 0, 0);
  ctx.restore();

  // 象限标签
  ctx.font = 'bold 14px -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  
  // Q1 标签 (右上)
  ctx.fillStyle = quadColors[0].border.replace('0.3', '0.8');
  ctx.fillText(L.quadQ1, midX + plotW / 4, pad.top + 25);
  ctx.font = '11px -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif';
  ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
  ctx.fillText(L.quadQ1Desc, midX + plotW / 4, pad.top + 42);

  // Q2 标签 (左上)
  ctx.font = 'bold 14px -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif';
  ctx.fillStyle = quadColors[2].border.replace('0.3', '0.8');
  ctx.fillText(L.quadQ2, pad.left + plotW / 4, pad.top + 25);
  ctx.font = '11px -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif';
  ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
  ctx.fillText(L.quadQ2Desc, pad.left + plotW / 4, pad.top + 42);

  // Q3 标签 (左下)
  ctx.font = 'bold 14px -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif';
  ctx.fillStyle = quadColors[3].border.replace('0.3', '0.8');
  ctx.fillText(L.quadQ3, pad.left + plotW / 4, midY + plotH / 4);
  ctx.font = '11px -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif';
  ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
  ctx.fillText(L.quadQ3Desc, pad.left + plotW / 4, midY + plotH / 4 + 17);

  // Q4 标签 (右下)
  ctx.font = 'bold 14px -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif';
  ctx.fillStyle = quadColors[1].border.replace('0.3', '0.8');
  ctx.fillText(L.quadQ4, midX + plotW / 4, midY + plotH / 4);
  ctx.font = '11px -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif';
  ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
  ctx.fillText(L.quadQ4Desc, midX + plotW / 4, midY + plotH / 4 + 17);

  // 绘制散点
  const pointColors = {
    0: 'rgba(46, 204, 113, 0.7)',   // Q1: 绿色
    1: 'rgba(52, 152, 219, 0.7)',   // Q4: 蓝色
    2: 'rgba(243, 156, 18, 0.7)',   // Q2: 橙色
    3: 'rgba(231, 76, 60, 0.7)',    // Q3: 红色
  };

  for (const p of quadRects) {
    const isHovered = p === hovered;
    const color = pointColors[p.quadrant];

    ctx.beginPath();
    ctx.arc(p.cx, p.cy, p.radius, 0, Math.PI * 2);

    if (isHovered) {
      ctx.fillStyle = color.replace('0.7', '1');
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();
    } else {
      ctx.fillStyle = color;
      ctx.fill();
    }
  }
}

function hitTestQuadrant(mx, my) {
  const sidebarW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sidebar-w'));
  const cx = mx - sidebarW;
  const cy = my;

  // 从后往前遍历，优先返回上层的点
  for (let i = quadRects.length - 1; i >= 0; i--) {
    const p = quadRects[i];
    const dx = cx - p.cx;
    const dy = cy - p.cy;
    if (dx * dx + dy * dy <= p.radius * p.radius) {
      return p;
    }
  }
  return null;
}

function computeQuadrantStats() {
  const L = LANG[currentLang];
  
  // 初始化各象限统计
  const stats = {
    0: { jobs: 0, employment: 0, totalPay: 0, count: 0 },  // Q1
    1: { jobs: 0, employment: 0, totalPay: 0, count: 0 },  // Q4
    2: { jobs: 0, employment: 0, totalPay: 0, count: 0 },  // Q2
    3: { jobs: 0, employment: 0, totalPay: 0, count: 0 },  // Q3
  };
  
  // 遍历所有数据
  for (const d of data) {
    if (d.exposure == null || d.outlook == null) continue;
    const quadrant = (d.exposure >= 5 ? 0 : 2) + (d.outlook >= 0 ? 0 : 1);
    stats[quadrant].count++;
    stats[quadrant].employment += d.jobs || 0;
    if (d.pay) {
      stats[quadrant].totalPay += d.pay * (d.jobs || 1);
      stats[quadrant].jobs += d.jobs || 1;
    }
  }
  
  // 更新UI
  const quadrants = [
    { id: '1', key: 0, title: L.quadQ1 },
    { id: '2', key: 2, title: L.quadQ2 },
    { id: '3', key: 3, title: L.quadQ3 },
    { id: '4', key: 1, title: L.quadQ4 },
  ];
  
  for (const q of quadrants) {
    const s = stats[q.key];
    const avgPay = s.jobs > 0 ? Math.round(s.totalPay / s.jobs) : 0;
    
    document.getElementById(`quadQ${q.id}Title`).textContent = q.title;
    document.getElementById(`quadQ${q.id}Jobs`).textContent = s.count;
    document.getElementById(`quadQ${q.id}Emp`).textContent = formatNumber(s.employment);
    document.getElementById(`quadQ${q.id}Pay`).textContent = formatPay(avgPay);
    document.getElementById(`quadQ${q.id}JobsLabel`).textContent = L.quadJobs;
    document.getElementById(`quadQ${q.id}EmpLabel`).textContent = L.quadEmployment;
    document.getElementById(`quadQ${q.id}PayLabel`).textContent = L.quadAvgPay;
  }
}

function layout() {
  const sidebarW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sidebar-w'));
  const w = (window.innerWidth - sidebarW);
  const h = window.innerHeight;

  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + "px";
  canvas.style.height = h + "px";

  const tx = MARGIN;
  const ty = MARGIN;
  const tw = w - MARGIN * 2;
  const th = h - MARGIN * 2;

  const byCategory = {};
  for (const d of data) {
    const cat = d.category;
    if (!byCategory[cat]) byCategory[cat] = [];
    byCategory[cat].push(d);
  }

  const categories = Object.keys(byCategory).map(cat => ({
    cat,
    items: byCategory[cat].sort((a, b) => (b.jobs || 0) - (a.jobs || 0)),
    value: byCategory[cat].reduce((s, d) => s + (d.jobs || 1), 0),
  })).sort((a, b) => b.value - a.value);

  const catRects = squarify(categories, tx, ty, tw, th);

  rects = [];
  for (const cr of catRects) {
    const innerGap = GAP;
    const items = cr.items.map(d => ({ ...d, value: d.jobs || 1 }));
    const innerRects = squarify(items,
      cr.rx + innerGap, cr.ry + innerGap,
      cr.rw - innerGap * 2, cr.rh - innerGap * 2
    );
    for (const ir of innerRects) {
      rects.push(ir);
    }
  }
}

function draw() {
  const w = canvas.width;
  const h = canvas.height;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = "#0a0a0f";
  ctx.fillRect(0, 0, w / dpr, h / dpr);

  for (const r of rects) {
    const isHovered = r === hovered;

    const g = GAP / 2;
    const rx = r.rx + g;
    const ry = r.ry + g;
    const rw = r.rw - g * 2;
    const rh = r.rh - g * 2;

    if (rw <= 0 || rh <= 0) continue;

    const fillAlpha = isHovered ? 0.8 : 0.5;
    ctx.fillStyle = exposureColorCSS(r.exposure, fillAlpha);
    ctx.fillRect(rx, ry, rw, rh);

    if (isHovered) {
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 2;
      ctx.strokeRect(rx, ry, rw, rh);
    }

    const minW = 50;
    const minH = 18;
    if (rw > minW && rh > minH) {
      ctx.save();
      ctx.beginPath();
      ctx.rect(rx + 4, ry + 2, rw - 8, rh - 4);
      ctx.clip();

      const fontSize = Math.min(13, Math.max(9, Math.min(rw / 10, rh / 3)));
      ctx.font = `500 ${fontSize}px -apple-system, system-ui, sans-serif`;
      ctx.fillStyle = isHovered ? "#fff" : "rgba(255,255,255,0.85)";
      ctx.textBaseline = "top";
      ctx.fillText(getTitle(r), rx + 5, ry + 4);

      if (rh > 34 && rw > 60) {
        const info = (r.exposure != null ? r.exposure + "/10" : "") +
                     (r.jobs ? " \u00b7 " + formatNumber(r.jobs) + " jobs" : "");
        ctx.font = `400 ${Math.max(8, fontSize - 2)}px -apple-system, system-ui, sans-serif`;
        ctx.fillStyle = "rgba(255,255,255,0.5)";
        ctx.fillText(info, rx + 5, ry + 4 + fontSize + 2);
      }

      ctx.restore();
    }
  }
}

function hitTest(mx, my) {
  const sidebarW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sidebar-w'));
  const cx = mx - sidebarW;
  const cy = my;
  for (let i = rects.length - 1; i >= 0; i--) {
    const r = rects[i];
    if (cx >= r.rx && cx < r.rx + r.rw && cy >= r.ry && cy < r.ry + r.rh) {
      return r;
    }
  }
  return null;
}

function formatNumber(n) {
  if (n == null) return "\u2014";
  if (n >= 1000000) return (n / 1000000).toFixed(1) + "M";
  if (n >= 1000) return Math.round(n / 1000) + "K";
  return n.toLocaleString();
}

function formatPay(n) {
  if (n == null) return "\u2014";
  return "$" + n.toLocaleString();
}

// ── Column view (exposure x outlook) ────────────────────────────────────

let colRects = [];

function layoutColumns() {
  const sidebarW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sidebar-w'));
  const w = (window.innerWidth - sidebarW);
  const h = window.innerHeight;

  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + "px";
  canvas.style.height = h + "px";

  const pad = { top: 20, bottom: 24, left: 4, right: 4 };
  const plotW = w - pad.left - pad.right;
  const plotH = h - pad.top - pad.bottom;
  const colGap = 2;

  // Group by exposure score
  const byExposure = {};
  let totalJobs = 0;
  for (const d of data) {
    if (d.exposure == null) continue;
    if (!byExposure[d.exposure]) byExposure[d.exposure] = [];
    byExposure[d.exposure].push(d);
    totalJobs += d.jobs || 0;
  }

  // Find which exposure scores exist
  const scores = Object.keys(byExposure).map(Number).sort((a, b) => a - b);
  const numCols = scores.length;

  // Column widths proportional to total jobs in that exposure level
  const colJobTotals = scores.map(s => byExposure[s].reduce((sum, d) => sum + (d.jobs || 0), 0));
  const totalGap = colGap * (numCols - 1);
  const availW = plotW - totalGap;

  colRects = [];
  let cx = pad.left;

  for (let i = 0; i < scores.length; i++) {
    const score = scores[i];
    const items = byExposure[score];
    const colJobs = colJobTotals[i];
    const colW = (colJobs / totalJobs) * availW;

    // Sort by outlook descending (best outlook at top)
    items.sort((a, b) => (b.outlook || 0) - (a.outlook || 0));

    let cy = pad.top;
    for (const d of items) {
      const jobs = d.jobs || 0;
      const itemH = colJobs > 0 ? (jobs / colJobs) * plotH : 0;
      if (itemH < 0.3) { cy += itemH; continue; }
      colRects.push({ ...d, rx: cx, ry: cy, rw: colW, rh: itemH });
      cy += itemH;
    }

    cx += colW + colGap;
  }

  // Store metadata for axis drawing
  colRects._meta = { scores, pad, colJobTotals, totalJobs, availW, plotH, colGap };
}

function drawColumns() {
  const w = canvas.width;
  const h = canvas.height;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = "#0a0a0f";
  ctx.fillRect(0, 0, w / dpr, h / dpr);

  const meta = colRects._meta;
  if (!meta) return;

  // Draw column headers (exposure scores)
  ctx.font = "500 11px -apple-system, system-ui, sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "bottom";

  let hx = meta.pad.left;
  for (let i = 0; i < meta.scores.length; i++) {
    const colW = (meta.colJobTotals[i] / meta.totalJobs) * meta.availW;
    if (colW > 16) {
      ctx.fillStyle = exposureColorCSS(meta.scores[i], 0.7);
      ctx.fillText(meta.scores[i], hx + colW / 2, meta.pad.top - 5);
    }
    hx += colW + meta.colGap;
  }

  // Draw axis label
  ctx.fillStyle = "rgba(255,255,255,0.4)";
  ctx.font = '11px -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif';
  ctx.textAlign = "center";
  ctx.textBaseline = "top";
  const canvasW = w / dpr;
  const L = LANG[currentLang];
  ctx.fillText(L.ttExposure, meta.pad.left + meta.availW / 2, meta.pad.top + meta.plotH + 6);

  // Draw rectangles
  const gap = 0.5;
  for (const r of colRects) {
    const isHovered = r === hovered;
    const rx = r.rx + gap;
    const ry = r.ry + gap;
    const rw = r.rw - gap * 2;
    const rh = r.rh - gap * 2;
    if (rw <= 0 || rh <= 0) continue;

    const fillAlpha = isHovered ? 0.8 : 0.5;
    ctx.fillStyle = outlookColorCSS(r.outlook, fillAlpha);
    ctx.fillRect(rx, ry, rw, rh);

    if (isHovered) {
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 2;
      ctx.strokeRect(rx, ry, rw, rh);
    }

    // Labels
    if (rw > 40 && rh > 14) {
      ctx.save();
      ctx.beginPath();
      ctx.rect(rx + 3, ry + 1, rw - 6, rh - 2);
      ctx.clip();

      const fontSize = Math.min(12, Math.max(8, Math.min(rw / 12, rh / 2.5)));
      ctx.font = `500 ${fontSize}px -apple-system, system-ui, sans-serif`;
      ctx.fillStyle = isHovered ? "#fff" : "rgba(255,255,255,0.85)";
      ctx.textBaseline = "top";
      ctx.textAlign = "left";
      ctx.fillText(getTitle(r), rx + 4, ry + 2);

      if (rh > 28 && rw > 50) {
        const info = (r.outlook != null ? (r.outlook > 0 ? "+" : "") + r.outlook + "%" : "") +
                     (r.jobs ? " \u00b7 " + formatNumber(r.jobs) : "");
        ctx.font = `400 ${Math.max(7, fontSize - 2)}px -apple-system, system-ui, sans-serif`;
        ctx.fillStyle = "rgba(255,255,255,0.5)";
        ctx.fillText(info, rx + 4, ry + 2 + fontSize + 1);
      }

      ctx.restore();
    }
  }
}

function hitTestColumns(mx, my) {
  const sidebarW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sidebar-w'));
  const cx = mx - sidebarW;
  const cy = my;
  for (let i = colRects.length - 1; i >= 0; i--) {
    const r = colRects[i];
    if (cx >= r.rx && cx < r.rx + r.rw && cy >= r.ry && cy < r.ry + r.rh) {
      return r;
    }
  }
  return null;
}

// ── Sidebar stats ──────────────────────────────────────────────────────

function computeStats() {
  const totalJobs = data.reduce((s, d) => s + (d.jobs || 0), 0);

  // Job-weighted average exposure
  let weightedSum = 0, weightedCount = 0;
  for (const d of data) {
    if (d.exposure != null && d.jobs) {
      weightedSum += d.exposure * d.jobs;
      weightedCount += d.jobs;
    }
  }
  const weightedAvg = weightedCount > 0 ? weightedSum / weightedCount : 0;

  // Histogram: jobs per exposure score 0-10
  const histogram = new Array(11).fill(0);
  for (const d of data) {
    if (d.exposure != null && d.jobs) {
      histogram[d.exposure] += d.jobs;
    }
  }

  // Tiers
  const L = LANG[currentLang];
  const tiers = [
    { name: L.tiers[0], range: [0, 1], color: exposureColorCSS(0.5, 1) },
    { name: L.tiers[1], range: [2, 3], color: exposureColorCSS(2.5, 1) },
    { name: L.tiers[2], range: [4, 5], color: exposureColorCSS(4.5, 1) },
    { name: L.tiers[3], range: [6, 7], color: exposureColorCSS(6.5, 1) },
    { name: L.tiers[4], range: [8, 10], color: exposureColorCSS(9, 1) },
  ];
  for (const tier of tiers) {
    tier.jobs = 0;
    for (const d of data) {
      if (d.exposure != null && d.jobs &&
          d.exposure >= tier.range[0] && d.exposure <= tier.range[1]) {
        tier.jobs += d.jobs;
      }
    }
    tier.pct = totalJobs > 0 ? (tier.jobs / totalJobs * 100) : 0;
  }

  // Wages exposed (jobs with exposure >= 7, weighted by pay)
  let wagesExposed = 0;
  for (const d of data) {
    if (d.exposure != null && d.exposure >= 7 && d.jobs && d.pay) {
      wagesExposed += d.jobs * d.pay;
    }
  }

  // Render
  document.getElementById("statTotalJobs").textContent =
    (totalJobs / 1e6).toFixed(0) + "M";
  document.getElementById("statAvgExposure").innerHTML =
    `<span style="color:${exposureColorCSS(weightedAvg, 1)}">${weightedAvg.toFixed(1)}</span>`;

  // Histogram
  const maxHist = Math.max(...histogram);
  const histEl = document.getElementById("histogram");
  histEl.innerHTML = histogram.map((count, i) => {
    const h = maxHist > 0 ? (count / maxHist * 100) : 0;
    return `<div class="bar" style="height:${Math.max(2, h)}%;background:${exposureColorCSS(i, 0.7)}" title="${i}: ${formatNumber(count)} jobs"></div>`;
  }).join("");

  // Tier breakdown
  const tierEl = document.getElementById("tierBar");
  tierEl.innerHTML = tiers.map(t =>
    `<div class="tier-row">
      <div class="tier-color" style="background:${t.color}"></div>
      <span class="tier-name">${t.name} (${t.range[0]}-${t.range[1]})</span>
      <span class="tier-jobs">${formatNumber(t.jobs)}</span>
      <span class="tier-pct">${t.pct.toFixed(0)}%</span>
    </div>`
  ).join("");

  // Exposure by pay band
  const payBands = [
    { label: L.payBands[0], min: 0, max: 35000 },
    { label: L.payBands[1], min: 35000, max: 50000 },
    { label: L.payBands[2], min: 50000, max: 75000 },
    { label: L.payBands[3], min: 75000, max: 100000 },
    { label: L.payBands[4], min: 100000, max: Infinity },
  ];
  const payChartEl = document.getElementById("payChart");
  payChartEl.innerHTML = payBands.map(band => {
    let wSum = 0, wCount = 0;
    for (const d of data) {
      if (d.exposure != null && d.jobs && d.pay != null &&
          d.pay >= band.min && d.pay < band.max) {
        wSum += d.exposure * d.jobs;
        wCount += d.jobs;
      }
    }
    const avg = wCount > 0 ? wSum / wCount : 0;
    const pct = avg / 10 * 100;
    return `<div class="hbar-row">
      <span class="hbar-label">${band.label}</span>
      <div class="hbar-track"><div class="hbar-fill" style="width:${pct}%;background:${exposureColorCSS(avg, 0.8)}"></div></div>
      <span class="hbar-val">${avg.toFixed(1)}</span>
    </div>`;
  }).join("");

  // Exposure by education
  const eduGroups = [
    { label: L.eduGroups[0], match: ["无正式教育证书", "高中文凭或同等学历", "No formal educational credential", "High school diploma or equivalent"] },
    { label: L.eduGroups[1], match: ["高等教育非学位证书", "大学肄业", "副学士学位", "Postsecondary nondegree award", "Some college, no degree", "Associate's degree"] },
    { label: L.eduGroups[2], match: ["学士学位", "Bachelor's degree"] },
    { label: L.eduGroups[3], match: ["硕士学位", "Master's degree"] },
    { label: L.eduGroups[4], match: ["博士或专业学位", "Doctoral or professional degree"] },
  ];
  const eduChartEl = document.getElementById("eduChart");
  eduChartEl.innerHTML = eduGroups.map(grp => {
    let wSum = 0, wCount = 0;
    for (const d of data) {
      if (d.exposure != null && d.jobs && grp.match.includes(d.education)) {
        wSum += d.exposure * d.jobs;
        wCount += d.jobs;
      }
    }
    const avg = wCount > 0 ? wSum / wCount : 0;
    const pct = avg / 10 * 100;
    return `<div class="hbar-row">
      <span class="hbar-label">${grp.label}</span>
      <div class="hbar-track"><div class="hbar-fill" style="width:${pct}%;background:${exposureColorCSS(avg, 0.8)}"></div></div>
      <span class="hbar-val">${avg.toFixed(1)}</span>
    </div>`;
  }).join("");

  // Wages
  const trillions = wagesExposed / 1e12;
  document.getElementById("statWages").textContent =
    "$" + trillions.toFixed(1) + "T";
}

// ── Events ─────────────────────────────────────────────────────────────

canvas.addEventListener("mousemove", (e) => {
  let hit;
  if (currentView === "treemap") {
    hit = hitTest(e.clientX, e.clientY);
  } else if (currentView === "quadrant") {
    hit = hitTestQuadrant(e.clientX, e.clientY);
  } else {
    hit = hitTestColumns(e.clientX, e.clientY);
  }
  if (hit !== hovered) {
    hovered = hit;
    if (currentView === "treemap") draw();
    else if (currentView === "quadrant") drawQuadrant();
    else drawColumns();
  }
  if (hovered) {
    showTooltip(hovered, e.clientX, e.clientY);
    canvas.style.cursor = "pointer";
  } else {
    hideTooltip();
    canvas.style.cursor = "default";
  }
});

canvas.addEventListener("click", (e) => {
  let hit;
  if (currentView === "treemap") {
    hit = hitTest(e.clientX, e.clientY);
  } else if (currentView === "quadrant") {
    hit = hitTestQuadrant(e.clientX, e.clientY);
  } else {
    hit = hitTestColumns(e.clientX, e.clientY);
  }
  if (currentView === "quadrant" && hit) {
    // 四象限视图点击打开报告浮层
    selectedJob = hit;
    showReport(hit);
  } else if (hit && hit.url) {
    window.open(hit.url, "_blank");
  }
});

canvas.addEventListener("mouseleave", () => {
  hovered = null;
  hideTooltip();
  if (currentView === "treemap") draw();
  else if (currentView === "quadrant") drawQuadrant();
  else drawColumns();
});

function resize() {
  dpr = window.devicePixelRatio || 1;
  if (currentView === "treemap") {
    layout();
    draw();
  } else if (currentView === "quadrant") {
    layoutQuadrant();
    drawQuadrant();
  } else {
    layoutColumns();
    drawColumns();
  }
}

// ── Legend gradient ────────────────────────────────────────────────────

function drawGradientLegend() {
  const c = document.getElementById("gradientLegend");
  const gctx = c.getContext("2d");
  for (let x = 0; x < 80; x++) {
    const score = (x / 79) * 10;
    gctx.fillStyle = exposureColorCSS(score, 1);
    gctx.fillRect(x, 0, 1, 8);
  }
}

// ── Load ───────────────────────────────────────────────────────────────

fetch("data.json")
  .then(r => r.json())
  .then(d => {
    data = d;
    computeStats();
    drawGradientLegend();
    resize();
    initSearch();
    initViewTooltip();
  });

window.addEventListener("resize", resize);

// ── Search & Report ─────────────────────────────────────────────────────

let searchInput = null;
let searchResults = null;
let reportOverlay = null;
let selectedJob = null;
let rationaleExpanded = false;

function initSearch() {
  searchInput = document.getElementById('searchInput');
  searchResults = document.getElementById('searchResults');
  reportOverlay = document.getElementById('reportOverlay');

  // 搜索输入事件
  let debounceTimer;
  searchInput.addEventListener('input', (e) => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
      const query = e.target.value.trim();
      if (query.length >= 1) {
        searchJobs(query);
      } else {
        hideSearchResults();
      }
    }, 200);
  });

  // 点击外部关闭搜索结果
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-container')) {
      hideSearchResults();
    }
  });

  // ESC键关闭报告
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      hideReport();
      hideSearchResults();
    }
  });

  // 点击遮罩关闭报告
  reportOverlay.addEventListener('click', (e) => {
    if (e.target === reportOverlay) {
      hideReport();
    }
  });
}

function searchJobs(query) {
  const queryLower = query.toLowerCase();
  const results = [];

  for (const job of data) {
    const titleEn = (job.title || '').toLowerCase();
    const titleCn = (job.title_cn || '').toLowerCase();
    const titleToShow = currentLang === 'zh' ? (job.title_cn || job.title) : job.title;

    // 模糊匹配
    if (titleEn.includes(queryLower) || titleCn.includes(queryLower)) {
      results.push({
        job,
        title: titleToShow
      });
    }

    if (results.length >= 8) break;
  }

  renderSearchResults(results);
}

function renderSearchResults(results) {
  const L = LANG[currentLang];

  if (results.length === 0) {
    searchResults.innerHTML = `<div class="search-result-item" style="color: var(--fg2); cursor: default;">${L.noResults}</div>`;
    searchResults.classList.add('visible');
    return;
  }

  searchResults.innerHTML = results.map(r => `
    <div class="search-result-item" onclick="selectJob(${data.indexOf(r.job)})">
      <div class="job-title">${r.title}</div>
      <div class="job-category">${currentLang === 'zh' ? (r.job.category_cn || r.job.category) : r.job.category}</div>
    </div>
  `).join('');

  searchResults.classList.add('visible');
}

function hideSearchResults() {
  searchResults.classList.remove('visible');
}

function selectJob(index) {
  selectedJob = data[index];
  hideSearchResults();
  searchInput.value = '';
  showReport(selectedJob);
}

function showReport(job) {
  const L = LANG[currentLang];
  const body = document.getElementById('reportBody');

  // 计算暴露度等级
  const exposure = job.exposure || 0;
  const exposureLevel = Math.min(4, Math.floor(exposure / 2.1));
  const exposureColor = exposureColorCSS(exposure, 1);

  // 计算薪资比较
  const avgPay = data.reduce((s, d) => s + (d.pay || 0), 0) / data.length;
  const payRatio = job.pay ? (job.pay / avgPay * 100).toFixed(0) : 100;
  const payCompare = job.pay > avgPay * 1.1 ? L.reportAboveAvg :
                     job.pay < avgPay * 0.9 ? L.reportBelowAvg : L.reportComparedToAvg;

  // 就业前景
  const outlook = job.outlook || 0;
  const outlookDesc = getOutlookDesc(job);

  // 相似职业推荐
  const recommendations = getRecommendations(job);

  // 构建报告内容
  body.innerHTML = `
    <!-- AI暴露度 -->
    <div class="report-section">
      <div class="report-section-title">🎯 ${L.reportExposure}</div>
      <div class="exposure-display">
        <div class="exposure-score" style="color: ${exposureColor}">${exposure}/10</div>
        <div style="flex: 1;">
          <div style="height: 8px; background: rgba(255,255,255,0.08); border-radius: 4px; overflow: hidden;">
            <div style="height: 100%; width: ${exposure * 10}%; background: ${exposureColor}; border-radius: 4px;"></div>
          </div>
          <div style="font-size: 11px; color: var(--fg2); margin-top: 4px;">${L.reportExposureLevel[exposureLevel]}</div>
        </div>
      </div>
    </div>

    <!-- 薪资信息 -->
    <div class="report-section">
      <div class="report-section-title">💰 ${L.reportPay}</div>
      <div class="stat-row">
        <span class="stat-label">${L.reportMedianPay}</span>
        <span class="stat-value">${formatPay(job.pay)}</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">${payCompare}</span>
        <span class="stat-value">${payRatio}%</span>
      </div>
    </div>

    <!-- 就业规模 -->
    <div class="report-section">
      <div class="report-section-title">📊 ${L.reportJobs}</div>
      <div class="stat-row">
        <span class="stat-label">${L.reportEmployment}</span>
        <span class="stat-value">${formatNumber(job.jobs)}</span>
      </div>
    </div>

    <!-- 就业前景 -->
    <div class="report-section">
      <div class="report-section-title">📈 ${L.reportOutlook}</div>
      <div class="stat-row">
        <span class="stat-label">${L.reportOutlookGrowth}</span>
        <span class="stat-value">${outlook > 0 ? '+' : ''}${outlook}% ${outlookDesc ? '(' + outlookDesc + ')' : ''}</span>
      </div>
    </div>

    <!-- 教育要求 -->
    <div class="report-section">
      <div class="report-section-title">🎓 ${L.reportEducation}</div>
      <div class="stat-row">
        <span class="stat-label">${getEducation(job)}</span>
      </div>
    </div>

    <!-- AI影响分析 -->
    <div class="report-section">
      <div class="report-section-title">🤖 ${L.reportAnalysis}</div>
      <div class="rationale-text" id="rationaleText">
        ${truncateText(getRationale(job), 200)}
      </div>
      <span class="rationale-toggle" onclick="toggleRationale()">${L.reportExpand}</span>
    </div>

    <!-- 转型建议 -->
    ${recommendations.length > 0 ? `
    <div class="report-section">
      <div class="report-section-title">💡 ${L.reportRecommendations}</div>
      <div style="font-size: 11px; color: var(--fg2); margin-bottom: 8px;">${L.reportSimilarJobs}</div>
      <div class="recommendations-list">
        ${recommendations.map(r => `
          <div class="recommendation-item" onclick="selectJob(${data.indexOf(r)})">
            <span class="recommendation-name">${getTitle(r)}</span>
            <span class="recommendation-exposure" style="color: ${exposureColorCSS(r.exposure, 1)}">${r.exposure}/10</span>
          </div>
        `).join('')}
      </div>
    </div>
    ` : ''}
  `;

  // 更新标题
  document.getElementById('reportTitle').textContent = getTitle(job);
  document.getElementById('reportCategory').textContent = currentLang === 'zh' ? (job.category_cn || job.category) : job.category;

  // 显示浮层
  reportOverlay.classList.add('visible');
  rationaleExpanded = false;
}

function hideReport() {
  reportOverlay.classList.remove('visible');
  selectedJob = null;
}

function toggleRationale() {
  if (!selectedJob) return;

  const textEl = document.getElementById('rationaleText');
  const L = LANG[currentLang];
  rationaleExpanded = !rationaleExpanded;

  if (rationaleExpanded) {
    textEl.textContent = getRationale(selectedJob);
    document.querySelector('.rationale-toggle').textContent = L.reportCollapse;
  } else {
    textEl.textContent = truncateText(getRationale(selectedJob), 200);
    document.querySelector('.rationale-toggle').textContent = L.reportExpand;
  }
}

function truncateText(text, maxLength) {
  if (!text || text.length <= maxLength) return text || '';
  return text.substring(0, maxLength) + '...';
}

function getRecommendations(job) {
  if (!job || !job.category) return [];

  // 找同类别的职业，按暴露度升序排序，取前3个
  const sameCategory = data.filter(d =>
    d.category === job.category &&
    d.title !== job.title &&
    d.exposure != null
  );

  // 按暴露度升序排序
  sameCategory.sort((a, b) => a.exposure - b.exposure);

  // 返回前3个
  return sameCategory.slice(0, 3);
}

// ── View Tooltip ────────────────────────────────────────────────────────

let viewTooltipTimer = null;

function initViewTooltip() {
  const tooltip = document.getElementById('viewTooltip');
  const buttons = document.querySelectorAll('.view-toggle button');

  buttons.forEach(btn => {
    btn.addEventListener('mouseenter', (e) => {
      viewTooltipTimer = setTimeout(() => {
        showViewTooltip(btn);
      }, 500);
    });

    btn.addEventListener('mouseleave', () => {
      clearTimeout(viewTooltipTimer);
      hideViewTooltip();
    });
  });
}

function showViewTooltip(button) {
  const view = button.dataset.view;
  const L = LANG[currentLang];
  const tooltip = document.getElementById('viewTooltip');

  let icon, title, bodyHtml;

  if (view === 'treemap') {
    icon = '📊';
    title = L.ttTreemapTitle;
    bodyHtml = `
      <h4>${L.ttTreemapWhat}</h4>
      <p>${L.ttTreemapWhatDesc}</p>
      <h4>${L.ttTreemapHow}</h4>
      <ul>
        <li><span class="highlight">${L.ttTreemapHow1}</span></li>
        <li><span class="highlight">${L.ttTreemapHow2}</span></li>
        <li><span class="highlight">${L.ttTreemapHow3}</span></li>
      </ul>
      <h4>${L.ttTreemapWhen}</h4>
      <p>${L.ttTreemapWhenDesc}</p>
    `;
  } else if (view === 'scatter') {
    icon = '📈';
    title = L.ttScatterTitle;
    bodyHtml = `
      <h4>${L.ttScatterWhat}</h4>
      <p>${L.ttScatterWhatDesc}</p>
      <h4>${L.ttScatterHow}</h4>
      <ul>
        <li><span class="highlight">${L.ttScatterHow1}</span></li>
        <li><span class="highlight">${L.ttScatterHow2}</span></li>
        <li><span class="highlight">${L.ttScatterHow3}</span></li>
        <li><span class="highlight">${L.ttScatterHow4}</span></li>
      </ul>
      <h4>${L.ttScatterWhen}</h4>
      <p>${L.ttScatterWhenDesc}</p>
    `;
  } else if (view === 'quadrant') {
    icon = '🎯';
    title = L.ttQuadrantTitle;
    bodyHtml = `
      <h4>${L.ttQuadrantWhat}</h4>
      <p>${L.ttQuadrantWhatDesc}</p>
      <h4>${L.ttQuadrantHow}</h4>
      <ul>
        <li><span class="highlight">${L.ttQuadrantHow1}</span></li>
        <li><span class="highlight">${L.ttQuadrantHow2}</span></li>
        <li><span class="highlight">${L.ttQuadrantHow3}</span></li>
      </ul>
      <h4>${L.ttQuadrantMeaning}</h4>
      <div class="quad-item"><div class="quad-dot q1"></div><span>${L.ttQuadrantQ1}</span></div>
      <div class="quad-item"><div class="quad-dot q2"></div><span>${L.ttQuadrantQ2}</span></div>
      <div class="quad-item"><div class="quad-dot q3"></div><span>${L.ttQuadrantQ3}</span></div>
      <div class="quad-item"><div class="quad-dot q4"></div><span>${L.ttQuadrantQ4}</span></div>
      <h4>${L.ttQuadrantWhen}</h4>
      <p>${L.ttQuadrantWhenDesc}</p>
    `;
  }

  // 更新内容
  tooltip.querySelector('.view-tooltip-icon').textContent = icon;
  tooltip.querySelector('.view-tooltip-title').textContent = title;
  tooltip.querySelector('.view-tooltip-body').innerHTML = bodyHtml;

  // 计算位置
  const btnRect = button.getBoundingClientRect();
  const sidebarW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sidebar-w'));
  
  let left = btnRect.right + 10;
  let top = btnRect.top;

  // 显示提示框以获取尺寸
  tooltip.style.left = '0px';
  tooltip.style.top = '0px';
  tooltip.classList.add('visible');

  // 检查是否超出右边界
  const tooltipRect = tooltip.getBoundingClientRect();
  if (left + tooltipRect.width > window.innerWidth - 10) {
    left = btnRect.left - tooltipRect.width - 10;
  }

  // 检查是否超出下边界
  if (top + tooltipRect.height > window.innerHeight - 10) {
    top = window.innerHeight - tooltipRect.height - 10;
  }

  // 确保不超出上边界
  if (top < 10) top = 10;

  tooltip.style.left = left + 'px';
  tooltip.style.top = top + 'px';
}

function hideViewTooltip() {
  document.getElementById('viewTooltip').classList.remove('visible');
}
</script>
</body>
</html>
